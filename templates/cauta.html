{% extends "base.html" %}
{% set pagina = 'cauta' %}

{% block titlu %}Cauta produs dupa ID sau nume{% endblock %}

{% block continut %}

<h1>
    <span class="badge badge-get">GET</span>
    /produs/&lt;id&gt; sau /produs/nume/&lt;nume&gt;
</h1>

<div class="card">
    <p style="color:#555; margin-bottom:1.2rem;">
        Introdu un <strong>ID</strong> sau un <strong>nume de produs</strong>
        pentru a cauta produsul.
    </p>

    <div class="form-grup" style="max-width:280px;">
        <label for="campInput">ID sau nume produs</label>
        <input
            type="text"
            id="campInput"
            placeholder="ex: 1 sau Mathematics"
            onkeydown="if(event.key==='Enter') cautaProdus()"
        >
    </div>

    <button class="btn-primar" onclick="cautaProdus()">Cauta</button>

    <div id="mesaj" class="mesaj"></div>

    <div id="rezultat" style="display:none; margin-top:1.2rem;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nume</th>
                    <th>Pret (RON)</th>
                </tr>
            </thead>
            <tbody id="rez-body">
            </tbody>
        </table>
    </div>
</div>

<script>
async function cautaProdus() {
    const valoare = document.getElementById('campInput').value.trim();
    const mesajEl = document.getElementById('mesaj');
    const rezultat = document.getElementById('rezultat');
    const rezBody = document.getElementById('rez-body');

    mesajEl.style.display = 'none';
    mesajEl.className = 'mesaj';
    rezultat.style.display = 'none';
    rezBody.innerHTML = '';

    if (!valoare) {
        afiseazaMesaj('eroare', 'Introdu un ID sau un nume de produs.');
        return;
    }

    let endpoint = '';

    if (!isNaN(valoare)) {
        endpoint = `/produs/${parseInt(valoare)}`;
    } else {
        endpoint = `/produs/nume/${valoare}`;
    }

    try {
        const raspuns = await fetch(endpoint);
        const date = await raspuns.json();

        if (raspuns.status === 404) {
            afiseazaMesaj('eroare', 'Produsul nu a fost gasit.');
            return;
        }

        if (!raspuns.ok) {
            afiseazaMesaj('eroare', date.eroare || 'Eroare necunoscuta.');
            return;
        }

        if (Array.isArray(date)) {
            date.forEach(produs => {
                const rand = document.createElement('tr');
                rand.innerHTML = `
                    <td>${produs.id}</td>
                    <td>${produs.name}</td>
                    <td>${produs.price}</td>
                `;
                rezBody.appendChild(rand);
            });
        } else {
            const rand = document.createElement('tr');
            rand.innerHTML = `
                <td>${date.id}</td>
                <td>${date.name}</td>
                <td>${date.price}</td>
            `;
            rezBody.appendChild(rand);
        }

        rezultat.style.display = 'block';
        afiseazaMesaj('succes', 'Produs gasit cu succes.');

    } catch (err) {
        afiseazaMesaj(
            'eroare',
            'Nu s-a putut conecta la server. Verifica daca aplicatia ruleaza.'
        );
    }
}

function afiseazaMesaj(tip, text) {
    const el = document.getElementById('mesaj');
    el.textContent = text;
    el.className = `mesaj ${tip}`;
    el.style.display = 'block';
}
</script>

{% endblock %}
